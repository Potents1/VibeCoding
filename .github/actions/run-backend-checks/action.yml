name: run-backend-checks
description: Run backend lint/type/test checks when tooling and tests exist.
inputs:
  test-path:
    description: Pytest test path
    required: false
    default: "tests"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        python -m pip install ruff mypy pytest || true
        if command -v ruff >/dev/null 2>&1; then
          ruff check agentsystem app main.py --select F,E9 || true
        fi
        if command -v mypy >/dev/null 2>&1; then
          mypy . --no-error-summary || true
        fi
        if [ -d "${{ inputs.test-path }}" ]; then
          pytest "${{ inputs.test-path }}" -q
        else
          echo "No tests directory '${{ inputs.test-path }}'; skipping pytest."
        fi
