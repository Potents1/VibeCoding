name: FullStackDeveloper Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]

jobs:
  publish-artifacts:
    name: Publish run_artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect run artifacts
        id: detect
        shell: bash
        run: |
          if [ -d "run_artifacts" ]; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
            files=$(find run_artifacts -type f | wc -l | tr -d ' ')
            echo "file_count=$files" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            echo "file_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload run artifacts
        if: steps.detect.outputs.has_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fullstackdeveloper-run-artifacts-${{ github.run_id }}
          path: |
            run_artifacts/**
          if-no-files-found: warn
          retention-days: 14

      - name: Append workflow summary
        shell: bash
        run: |
          {
            echo "## FullStackDeveloper Artifact Summary"
            echo ""
            echo "- Run ID: ${{ github.run_id }}"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Artifacts directory present: ${{ steps.detect.outputs.has_artifacts }}"
            echo "- Files discovered: ${{ steps.detect.outputs.file_count }}"
          } >> "$GITHUB_STEP_SUMMARY"
