name: Build Package

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".vscode/**"
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".vscode/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build deployable package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      release_id: ${{ steps.meta.outputs.release_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal build deps
        run: |
          python -m pip install --upgrade pip

      - name: Compute metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::8}"
          release_id="$(date +%Y%m%d%H%M%S)-${short_sha}"
          artifact_name="agi-package-${release_id}"
          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Assemble package
        shell: bash
        run: |
          mkdir -p dist/package
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "venv" \
            --exclude "agent-dashboard/node_modules" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".ruff_cache" \
            --exclude "*.pyc" \
            --exclude "logs/*" \
            --exclude "data/*.db" \
            ./ dist/package/
          cd dist/package
          zip -r "../${{ steps.meta.outputs.artifact_name }}.zip" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist/${{ steps.meta.outputs.artifact_name }}.zip
          retention-days: 14

      - name: Build summary
        shell: bash
        run: |
          {
            echo "## Build Package Summary"
            echo ""
            echo "- Release ID: ${{ steps.meta.outputs.release_id }}"
            echo "- Artifact: ${{ steps.meta.outputs.artifact_name }}"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
